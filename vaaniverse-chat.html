// Safe UUID — works on file://, http://, https://
function makeUUID() {
  try { return crypto.randomUUID(); } catch(e) {}
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function initSession() {
  try {
    VV_SID = makeUUID();
    const { error } = await sbClient.from('chat_sessions').insert({ session_id: VV_SID, step_reached: 0 });
    if (error) console.warn('VV Supabase insert error:', error.message);
    else console.log('VV session started:', VV_SID);
    VV_PING_TIMER = setInterval(pingSession, 30000);
  } catch(e) { console.warn('VV initSession failed:', e.message); }
}

async function pingSession() {
  if (!VV_SID) return;
  try {
    await sbClient.from('chat_sessions').update({ last_ping: new Date().toISOString() }).eq('session_id', VV_SID);
  } catch(e) {}
}

async function updateSession(data) {
  if (!VV_SID) return;
  try {
    const { error } = await sbClient.from('chat_sessions').update(data).eq('session_id', VV_SID);
    if (error) console.warn('VV update error:', error.message);
  } catch(e) { console.warn('VV updateSession failed:', e.message); }
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  open: false,
  started: false,
  triggered: false,
  step: null,
  name: '', email: '', company: '',
  challenge: '', role: '', stage: '',
  budget: '', timeline: '',
  retryCount: 0
};

// ─────────────────────────────────────────────
// TRIGGERS: 8s, scroll 30%, exit intent
// ─────────────────────────────────────────────
setTimeout(() => { if (!S.triggered) autoTrigger('normal'); }, 8000);

window.addEventListener('scroll', () => {
  if (S.triggered) return;
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  if (pct > 0.30) autoTrigger('normal');
}, { passive: true });

document.addEventListener('mouseleave', e => {
  if (e.clientY < 5 && !S.triggered) autoTrigger('exit');
});

function autoTrigger(type) {
  S.triggered = true;
  if (!S.open) toggleChat();
  if (type === 'exit') runStep('exit_intent');
  else if (!S.started) runStep('greeting');
}

// ─────────────────────────────────────────────
// TOGGLE
// ─────────────────────────────────────────────
function toggleChat() {
  S.open = !S.open;
  document.getElementById('vv-window').classList.toggle('open', S.open);
  if (S.open && !S.started) runStep('greeting');
}

// ─────────────────────────────────────────────
// PROGRESS BAR  (8 steps total)
// ─────────────────────────────────────────────
const STEP_MAP = {
  ask_name: 1, ask_email: 2, ask_company: 3,
  ask_challenge: 4, ask_role: 5, ask_stage: 6,
  ask_budget: 7, ask_timeline: 8
};
const TOTAL_STEPS = 8;

function updateProgress(step) {
  const n = STEP_MAP[step];
  if (!n) return;
  document.getElementById('vv-progress-label').textContent = `Step ${n} of ${TOTAL_STEPS}`;
  document.getElementById('vv-progress-fill').style.width = `${Math.round((n / TOTAL_STEPS) * 100)}%`;
}

// ─────────────────────────────────────────────
// FLOW STEPS
// ─────────────────────────────────────────────
function runStep(step) {
  S.step = step;

  if (step === 'greeting') {
    S.started = true;
    initSession(); // ← start Supabase session tracking
    botSay([
      'Hey there! Welcome to Vaaniverse — we help SaaS companies and startups nail their positioning, generate quality leads, and scale revenue without the cost of a full-time CMO. Let me ask you a few quick questions so I can find the best path forward for you!'
    ], () => runStep('ask_name'));
  }

  else if (step === 'ask_name') {
    updateProgress('ask_name');
    botSay(['First things first — what can I call you?'], enableInput);
  }

  else if (step === 'ask_email') {
    updateProgress('ask_email');
    botSay([`Great to meet you, ${S.name}! What\'s your work email?`], enableInput);
  }

  else if (step === 'ask_company') {
    updateProgress('ask_company');
    botSay(['And which company are you with?'], enableInput);
  }

  else if (step === 'thanks') {
    botSay(['Got it! Now tell me a bit about your growth challenges.'], () => runStep('ask_challenge'));
  }

  else if (step === 'ask_challenge') {
    updateProgress('ask_challenge');
    botSay(['What\'s your biggest growth challenge right now?'], () => {
      showChoices(['Not enough leads', 'Weak positioning', 'High CAC'], choice => {
        S.challenge = choice;
        userSay(choice);
        updateSession({ challenge: choice, step_reached: 4 });
        runStep('ask_role');
      });
    });
  }

  else if (step === 'ask_role') {
    updateProgress('ask_role');
    botSay(['And who am I speaking with today?'], () => {
      showChoices(['Founder', 'Marketer'], choice => {
        S.role = choice;
        userSay(choice);
        updateSession({ role: choice, step_reached: 5 });
        runStep('ask_stage');
      });
    });
  }

  else if (step === 'ask_stage') {
    updateProgress('ask_stage');
    botSay(['Where is your business at right now?'], () => {
      showChoices(['Pre-revenue', '$10k-$50k', '$50k+'], choice => {
        S.stage = choice;
        userSay(choice);
        updateSession({ stage: choice, step_reached: 6 });
        runStep('ask_budget');
      });
    });
  }

  else if (step === 'ask_budget') {
    updateProgress('ask_budget');
    botSay(['What\'s your monthly marketing budget range?'], () => {
      showChoices(['Under 1 Lakh', '1L - 2L', '2L - 5L', '5L+'], choice => {
        S.budget = choice;
        userSay(choice);
        updateSession({ budget: choice, step_reached: 7 });
        runStep('ask_timeline');
      });
    });
  }

  else if (step === 'ask_timeline') {
    updateProgress('ask_timeline');
    botSay(['How soon are you looking to get started?'], () => {
      showChoices(['Immediately', 'Within a month', 'Just exploring'], choice => {
        S.timeline = choice;
        userSay(choice);
        updateSession({ timeline: choice, step_reached: 8, completed: true });
        sendWebhook();
        runStep('insight');
      });
    });
  }

  else if (step === 'insight') {
    const insight = KB.insights[S.challenge]?.[S.role]?.[S.stage]
      || `Based on your profile, Vaaniverse can help you overcome ${S.challenge} with a tailored growth strategy. Our Fractional CMO approach is designed specifically for ${S.role}s at the ${S.stage} stage.`;
    botSay([insight], () => runStep('ask_call'));
  }

  else if (step === 'ask_call') {
    botSay(['Ready to map out your growth plan on a free 30-minute strategy call?'], () => {
      showChoices(['Book Now', 'Maybe Later'], choice => {
        userSay(choice);
        if (choice === 'Book Now') runStep('book_call');
        else runStep('maybe_later');
      });
    });
  }

  else if (step === 'book_call') {
    const cal = CFG.calendlyUrl && CFG.calendlyUrl !== 'YOUR_CALENDLY_URL'
      ? `<a href="${CFG.calendlyUrl}" target="_blank" style="color:#ffd700;font-weight:600;">Click here to book your call</a>`
      : `Please reach us at ${CFG.teamEmail} to schedule your call.`;
    botSay([`Awesome! ${cal} — looking forward to connecting with you!`]);
  }

  else if (step === 'maybe_later') {
    botSay(['No worries at all! We\'ll be in touch soon. Have a great day!']);
  }

  else if (step === 'exit_intent') {
    botSay(['Before you go — want our free SaaS Positioning Checklist to take with you?'], () => {
      showChoices(['Yes, send it!', 'No thanks'], choice => {
        userSay(choice);
        if (choice === 'Yes, send it!') {
          if (!S.email) {
            botSay(['Sure! What\'s your email so I can send it over?'], enableInput);
            S.step = 'exit_email';
          } else {
            botSay([`Sending it to ${S.email} right now!`]);
          }
        } else {
          botSay(['No problem! Have a wonderful day!']);
        }
      });
    });
  }

  else if (step === 'exit_email') {
    // handled via submitInput
  }

  else if (step === 'retry') {
    botSay(['Happy to help! You can type your question or type HUMAN to connect with our team directly.']);
  }

  else if (step === 'connect_agent') {
    botSay(['Connecting you to a live team member now — hang tight!']);
  }
}

// ─────────────────────────────────────────────
// USER INPUT
// ─────────────────────────────────────────────
function enableInput() {
  const inp = document.getElementById('vv-input');
  const btn = document.getElementById('vv-send');
  inp.disabled = false;
  btn.disabled = false;
  inp.focus();
}

function disableInput() {
  const inp = document.getElementById('vv-input');
  const btn = document.getElementById('vv-send');
  inp.disabled = true;
  btn.disabled = true;
  inp.value = '';
}

function onKey(e) { if (e.key === 'Enter') submitInput(); }

function submitInput() {
  const inp = document.getElementById('vv-input');
  const val = inp.value.trim();
  if (!val) return;

  // HUMAN keyword — anywhere in flow
  if (val.toLowerCase() === 'human') {
    userSay(val);
    disableInput();
    clearChoices();
    S.retryCount++;
    if (S.retryCount >= 2) runStep('connect_agent');
    else runStep('retry');
    return;
  }

  // FAQ handling — answer from KB then resume
  const faqReply = checkFAQ(val);
  if (faqReply) {
    userSay(val);
    disableInput();
    botSay([faqReply], () => {
      const cur = S.step;
      runStep(cur);
    });
    return;
  }

  userSay(val);
  disableInput();

  if (S.step === 'ask_name') {
    S.name = val;
    updateSession({ visitor_name: val, step_reached: 1 });
    runStep('ask_email');
  } else if (S.step === 'ask_email') {
    if (!isValidEmail(val)) {
      botSay(['Hmm, that doesn\'t look quite right — could you double-check your email?'], enableInput);
      return;
    }
    S.email = val;
    updateSession({ visitor_email: val, step_reached: 2 });
    runStep('ask_company');
  } else if (S.step === 'ask_company') {
    S.company = val;
    updateSession({ visitor_company: val, step_reached: 3 });
    sendWebhook('quick');
    runStep('thanks');
  } else if (S.step === 'exit_email') {
    if (!isValidEmail(val)) {
      botSay(['That email doesn\'t look right — could you try again?'], enableInput);
      return;
    }
    S.email = val;
    botSay([`Sending the SaaS Positioning Checklist to ${S.email} now!`]);
  }
}

// ─────────────────────────────────────────────
// FAQ DETECTION
// ─────────────────────────────────────────────
function checkFAQ(text) {
  const t = text.toLowerCase();
  if (t.includes('what do you do') || t.includes('who are you') || t.includes('about you') || t.includes('tell me about'))
    return KB.whatWeDo;
  if (t.includes('service') || t.includes('offer') || t.includes('help'))
    return KB.services;
  if (t.includes('price') || t.includes('cost') || t.includes('package') || t.includes('plan'))
    return `We offer three packages:\n\n${KB.packages.starter}\n\n${KB.packages.accelerator}\n\n${KB.packages.dominator}`;
  if (t.includes('approach') || t.includes('how do you') || t.includes('method') || t.includes('framework'))
    return KB.approach;
  if (t.includes('result') || t.includes('success') || t.includes('case') || t.includes('proven'))
    return KB.results;
  if (t.includes('contact') || t.includes('reach') || t.includes('email') || t.includes('phone') || t.includes('location'))
    return KB.contact;
  return null;
}

// ─────────────────────────────────────────────
// BOT MESSAGES
// ─────────────────────────────────────────────
function botSay(msgs, callback, idx = 0) {
  if (idx >= msgs.length) { if (callback) callback(); return; }
  const typing = showTyping();
  const delay = Math.min(msgs[idx].replace(/<[^>]*>/g, '').length * 18, 1400) + 300;
  setTimeout(() => {
    typing.remove();
    addMsg(msgs[idx], 'bot');
    setTimeout(() => botSay(msgs, callback, idx + 1), 350);
  }, delay);
}

function userSay(text) { addMsg(text, 'user'); }

function addMsg(html, who) {
  const el = document.createElement('div');
  el.className = `vv-msg ${who}`;
  el.innerHTML = html;
  document.getElementById('vv-messages').appendChild(el);
  scrollBottom();
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'vv-typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('vv-messages').appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const m = document.getElementById('vv-messages');
  m.scrollTop = m.scrollHeight;
}

// ─────────────────────────────────────────────
// CHOICES
// ─────────────────────────────────────────────
function showChoices(options, onClick) {
  const el = document.getElementById('vv-choices');
  el.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'vv-choice';
    btn.textContent = opt;
    btn.onclick = () => {
      clearChoices();
      onClick(opt);
    };
    el.appendChild(btn);
  });
}

function clearChoices() {
  document.getElementById('vv-choices').innerHTML = '';
}

// ─────────────────────────────────────────────
// WEBHOOK
// ─────────────────────────────────────────────
function sendWebhook(type = 'full') {
  if (!CFG.webhookUrl || CFG.webhookUrl === 'YOUR_MAKE_COM_WEBHOOK_URL') return;
  const payload = type === 'quick'
    ? {
        type: 'NEW LEAD — Basic Info',
        name: S.name,
        email: S.email,
        company: S.company,
        source: 'Vaaniverse Website Chatbot',
        timestamp: new Date().toISOString()
      }
    : {
        type: 'FULL LEAD — Complete Details',
        name: S.name,
        email: S.email,
        company: S.company,
        challenge: S.challenge,
        role: S.role,
        stage: S.stage,
        budget: S.budget,
        timeline: S.timeline,
        source: 'Vaaniverse Website Chatbot',
        timestamp: new Date().toISOString()
      };
  fetch(CFG.webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

// NEW CHAT — reset everything and start fresh
function newChat() {
  S.started = false;
  S.step = null;
  S.name = ''; S.email = ''; S.company = '';
  S.challenge = ''; S.role = ''; S.stage = '';
  S.budget = ''; S.timeline = '';
  S.retryCount = 0;
  document.getElementById('vv-progress-label').textContent = 'Step 0 of 8';
  document.getElementById('vv-progress-fill').style.width = '0%';
  document.getElementById('vv-messages').innerHTML = '';
  clearChoices();
  disableInput();
  runStep('greeting');
}
</script>
